<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lexi — AI Lead Qualifier</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f12;
      --surface: #1a1a20;
      --surface2: #22222a;
      --border: #2e2e38;
      --accent: #6c63ff;
      --accent-light: #8b85ff;
      --text: #e8e8f0;
      --text-muted: #7a7a90;
      --user-bubble: #6c63ff;
      --ai-bubble: #1e1e28;
      --success: #22c55e;
      --warning: #f59e0b;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
      --radius: 16px;
      --radius-sm: 8px;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* --- Layout --- */
    .app {
      width: 100%;
      max-width: 780px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }

    /* --- Header --- */
    header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
    }

    .avatar {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .header-info p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .status-dot {
      width: 8px; height: 8px;
      background: var(--success);
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .intent-badge {
      margin-left: auto;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--mono);
      letter-spacing: 0.05em;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      transition: all 0.4s ease;
    }
    .intent-badge.QUALIFIED { background: rgba(34,197,94,0.15); border-color: #22c55e; color: #22c55e; }
    .intent-badge.NURTURING { background: rgba(245,158,11,0.15); border-color: #f59e0b; color: #f59e0b; }
    .intent-badge.COLD      { background: rgba(239,68,68,0.15);  border-color: #ef4444; color: #ef4444; }

    /* --- Gate screen (name/email entry) --- */
    .gate {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      gap: 24px;
    }

    .gate h2 {
      font-size: 22px;
      font-weight: 600;
      text-align: center;
      letter-spacing: -0.02em;
    }

    .gate p {
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
      max-width: 320px;
      line-height: 1.6;
    }

    .gate-form {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field-group { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input[type="text"], input[type="email"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 13px 24px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    .btn-primary:hover { background: var(--accent-light); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* --- Chat area --- */
    .chat-area {
      flex: 1;
      display: none;
      flex-direction: column;
    }
    .chat-area.active { display: flex; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* --- Message bubbles --- */
    .message { display: flex; gap: 10px; max-width: 80%; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 100%;
    }

    .message.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .message.ai .msg-avatar { background: linear-gradient(135deg, var(--accent), #a78bfa); }
    .message.user .msg-avatar { background: var(--surface2); border: 1px solid var(--border); }

    /* --- Typing indicator --- */
    .typing-indicator { display: none; }
    .typing-indicator.visible { display: flex; }

    .dots { display: flex; gap: 4px; padding: 14px 16px; }
    .dots span {
      width: 6px; height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

    /* --- Booking card --- */
    .booking-card {
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-top: 8px;
    }

    .booking-card h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--success);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .booking-card p {
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
    }

    .booking-card .slot {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--success);
      margin-top: 6px;
    }

    /* --- Input area --- */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      background: var(--surface);
    }

    .input-area input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: var(--accent); }
    .input-area input::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 42px; height: 42px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--accent-light); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; fill: white; }

    /* --- Leads panel link --- */
    .leads-link {
      text-align: center;
      padding: 8px;
      font-size: 11px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
    .leads-link a { color: var(--accent-light); text-decoration: none; }
    .leads-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h1>Lexi</h1>
      <p><span class="status-dot"></span>AI Lead Qualifier — always online</p>
    </div>
    <div class="intent-badge" id="intentBadge">— NEW LEAD</div>
  </header>

  <!-- Gate: collect name + email before chat starts -->
  <div class="gate" id="gate">
    <h2>Book a free discovery call 👋</h2>
    <p>Chat with Lexi to learn how AI automation could help your business — and book a 30-min call if it's a good fit.</p>
    <div class="gate-form">
      <div class="field-group">
        <label for="userName">Your name</label>
        <input type="text" id="userName" placeholder="e.g. Sarah Johnson" autocomplete="name">
      </div>
      <div class="field-group">
        <label for="userEmail">Email address</label>
        <input type="email" id="userEmail" placeholder="sarah@example.com" autocomplete="email">
      </div>
      <button class="btn-primary" onclick="startChat()">Start chatting →</button>
    </div>
  </div>

  <!-- Chat UI (hidden until gate is complete) -->
  <div class="chat-area" id="chatArea">
    <div class="messages" id="messages">
      <!-- Typing indicator (AI) -->
      <div class="message ai typing-indicator" id="typingIndicator">
        <div class="msg-avatar">🤖</div>
        <div class="bubble ai-bubble">
          <div class="dots"><span></span><span></span><span></span></div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Type your message..." onkeydown="handleKey(event)">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
    <div class="leads-link">Dev tools: <a href="/leads" target="_blank">View captured leads →</a> | <a href="/docs" target="_blank">API docs →</a></div>
  </div>
</div>

<script>
  let sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  let userName = '';
  let userEmail = '';

  function startChat() {
    userName  = document.getElementById('userName').value.trim();
    userEmail = document.getElementById('userEmail').value.trim();

    if (!userName || !userEmail) {
      alert('Please enter your name and email to continue.');
      return;
    }
    if (!userEmail.includes('@')) {
      alert('Please enter a valid email address.');
      return;
    }

    document.getElementById('gate').style.display = 'none';
    document.getElementById('chatArea').classList.add('active');

    // Send an opening message automatically
    sendAIOpener();
  }

  async function sendAIOpener() {
    await sendToAPI(`Hi, my name is ${userName}`);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  async function sendMessage() {
    const input = document.getElementById('messageInput');
    const text  = input.value.trim();
    if (!text) return;

    input.value = '';
    addMessage('user', text);
    await sendToAPI(text);
  }

  async function sendToAPI(text) {
    setLoading(true);
    showTyping(true);

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sessionId,
          user_name:  userName,
          user_email: userEmail,
          message:    text
        })
      });

      const data = await res.json();

      showTyping(false);
      addMessage('ai', data.reply);
      updateIntentBadge(data.intent);

      if (data.booking && data.booking.confirmed) {
        showBookingCard(data.booking);
      }

    } catch (err) {
      showTyping(false);
      addMessage('ai', '⚠️ Sorry, something went wrong. Please check the server is running.');
    } finally {
      setLoading(false);
    }
  }

  function addMessage(role, text) {
    const messages = document.getElementById('messages');
    const typing   = document.getElementById('typingIndicator');

    const el = document.createElement('div');
    el.className = `message ${role}`;
    el.innerHTML = `
      <div class="msg-avatar">${role === 'ai' ? '🤖' : '👤'}</div>
      <div class="bubble">${escapeHTML(text)}</div>
    `;

    messages.insertBefore(el, typing);
    messages.scrollTop = messages.scrollHeight;
  }

  function showBookingCard(booking) {
    const messages = document.getElementById('messages');
    const typing   = document.getElementById('typingIndicator');

    const card = document.createElement('div');
    card.className = 'booking-card';
    card.innerHTML = `
      <h3>🎉 Discovery Call Confirmed</h3>
      <p>Great news, <strong>${escapeHTML(booking.name)}</strong>! Your spot is locked in.</p>
      <p class="slot">📅 ${escapeHTML(booking.slot)}</p>
      <p style="margin-top:8px;font-size:13px;color:var(--text-muted)">Confirmation sent to ${escapeHTML(booking.email)}</p>
    `;

    messages.insertBefore(card, typing);
    messages.scrollTop = messages.scrollHeight;
  }

  function updateIntentBadge(intent) {
    const badge = document.getElementById('intentBadge');
    badge.textContent = intent;
    badge.className = `intent-badge ${intent}`;
  }

  function showTyping(show) {
    document.getElementById('typingIndicator').classList.toggle('visible', show);
    const messages = document.getElementById('messages');
    messages.scrollTop = messages.scrollHeight;
  }

  function setLoading(loading) {
    document.getElementById('sendBtn').disabled   = loading;
    document.getElementById('messageInput').disabled = loading;
  }

  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }
</script>
</body>
</html>
